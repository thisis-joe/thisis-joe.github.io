name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
      - auto-sync
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # main 브랜치의 Quartz 블로그 코드 가져오기
      - name: Checkout blog source
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # auto-sync 브랜치의 글 콘텐츠 가져오기
      # 지금은 아직 auto-sync 브랜치가 없으므로, 다음 단계에서 만들 예정
      - name: Checkout synced contents
        uses: actions/checkout@v4
        with:
          ref: auto-sync
          path: synced-content

      # Quartz의 content 폴더를 auto-sync 브랜치의 content로 교체
      # 즉, main은 코드 담당, auto-sync는 글 담당
      - name: Replace Quartz content with synced content
        run: |
          rm -rf content
          mkdir -p content
          cp -r synced-content/content/. content/

      # Quartz는 Node 22 이상이 필요함
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # package-lock.json 기준으로 의존성 설치
      - name: Install dependencies
        run: npm ci

      # Quartz 빌드
      # 결과물은 public 폴더에 생성됨
      - name: Build Quartz
        run: npx quartz build

      # GitHub Pages에 올릴 public 폴더 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      # 업로드된 public 폴더를 GitHub Pages에 배포
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
